name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 7 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Build solution
        run: dotnet build TourGuide.sln --configuration Release

  test_rapide:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 7 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Run quick tests
        run: dotnet test TourGuideTest/TourGuideTest.csproj --filter "FullyQualifiedName!~PerformanceTest"

  package_artifacts:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 7 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Build again (Release)
        run: dotnet build TourGuide.sln --configuration Release

      - name: Aggregate all bin/Release/net7.0 outputs
        run: |
          mkdir -p artifacts

          for proj_dir in */ ; do
            bin_dir="$proj_dir/bin/Release/net7.0"
            if [ -d "$bin_dir" ]; then
              echo "Copying $bin_dir to artifacts/$proj_dir"
              cp -r "$bin_dir" "artifacts/$proj_dir/"
            fi
          done

      - name: Zip build artifacts
        run: |
          cd artifacts
          zip -r ../artifacts.zip .

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: artifacts.zip
