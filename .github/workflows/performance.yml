name: Performance Tests

on:
  schedule:
    - cron: '0 2 * * *'  # Tous les jours à 2h UTC
  workflow_dispatch:

jobs:
  performance_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET 7 SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.0.x'

      - name: Build solution
        run: dotnet build TourGuide.sln

      - name: Run performance tests
        run: dotnet test TourGuideTest/TourGuideTest.csproj --filter "FullyQualifiedName~PerformanceTest"
